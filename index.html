<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>HEKSEL STUDIO // CORE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
        /* ═══════════════════════════════════════════════════════════════
           RESET + VARIABLES — CLAUDE MATTE PALETTE
        ═══════════════════════════════════════════════════════════════ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #08080a;
            --glass: rgba(14, 14, 18, 0.85);
            --border-fine: rgba(255, 255, 255, 0.04);
            --accent-orange: #d97736;
            --accent-orange-glow: rgba(217, 119, 54, 0.35);
            --text-cream: #f4f0ea;
            --text-muted: #8a857f;
            --card-bg: rgba(14, 14, 18, 0.88);
            --transition: 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            --shadow-heavy: 0 20px 50px rgba(0, 0, 0, 0.6);
            /* Cores do gradiente animado */
            --grad-start: #00c6ff;
            --grad-end: #b45eff;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-deep);
            color: var(--text-cream);
            min-height: 100vh;
            overflow-x: hidden;
            padding: 0;
            margin: 0;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-deep);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-orange);
            border-radius: 4px;
            box-shadow: 0 0 8px var(--accent-orange-glow);
        }

        /* ── custom cursor ── */
        .cursor-dot,
        .cursor-ring {
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            transition: all 0.15s ease;
        }
        .cursor-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-orange);
            border-radius: 50%;
            box-shadow: 0 0 14px var(--accent-orange-glow);
            transform: translate(-50%, -50%);
        }
        .cursor-ring {
            width: 38px;
            height: 38px;
            border: 1.5px solid rgba(217, 119, 54, 0.40);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: 0.2s;
        }
        @media (pointer: coarse) {
            .cursor-dot,
            .cursor-ring {
                display: none;
            }
            body {
                cursor: auto;
            }
        }

        /* ── background subtle grid ── */
        .cyber-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            background:
                radial-gradient(ellipse 70% 60% at 15% 20%, rgba(217, 119, 54, 0.04), transparent 70%),
                radial-gradient(ellipse 60% 70% at 85% 85%, rgba(217, 119, 54, 0.03), transparent 70%),
                var(--bg-deep);
        }
        .cyber-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
            background-size: 70px 70px;
            animation: gridDrift 55s linear infinite;
            pointer-events: none;
        }
        @keyframes gridDrift {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(4%, 4%);
            }
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(18px);
            border: 1px solid var(--border-fine);
            border-radius: 28px;
        }

        h1, h2, h3, h4, .logo-text, .btn, .nav-link {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
        }
        .mono {
            font-family: 'Space Mono', monospace;
        }

        .btn {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.68rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 10px 22px;
            border-radius: 50px;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(217, 119, 54, 0.10), transparent 70%);
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
        }
        .btn:hover::after {
            opacity: 1;
        }
        .btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent-orange);
            box-shadow: 0 0 24px var(--accent-orange-glow);
            color: var(--text-cream);
        }

        /* ── Gradiente animado para textos (azul/roxo) ── */
        .gradient-animated {
            background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
            background-size: 200% 200%;
            animation: gradShift 4s ease-in-out infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }
        @keyframes gradShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ── Gradiente azul/branco para Trosk Matte ── */
        .trosk-matte-glow {
            background: linear-gradient(135deg, #00c6ff, #ffffff, #00c6ff);
            background-size: 300% 300%;
            animation: shimmerMatte 3s ease-in-out infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }
        @keyframes shimmerMatte {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ── Efeito vidro fosco com reflexo para BUG TRACKER ── */
        .panel-title {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 0.06em;
            margin-bottom: 18px;
            color: var(--text-cream);
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            overflow: hidden;
            max-width: fit-content;
        }
        .panel-title::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 60px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .panel-title::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                135deg,
                transparent 40%,
                rgba(255,255,255,0.02) 50%,
                transparent 60%
            );
            animation: glassReflect 6s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes glassReflect {
            0% { transform: translateX(-100%) rotate(25deg); }
            50% { transform: translateX(100%) rotate(25deg); }
            100% { transform: translateX(200%) rotate(25deg); }
        }
        .panel-title .badge {
            font-size: 0.55rem;
            font-weight: 700;
            padding: 2px 12px;
            border-radius: 40px;
            background: rgba(217, 119, 54, 0.12);
            color: var(--accent-orange);
            letter-spacing: 0.08em;
        }

        /* ──────────────────────────────────────────────────────────────
           LAYOUT
        ────────────────────────────────────────────────────────────── */
        .studio-dashboard {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 24px 80px;
            position: relative;
            z-index: 1;
        }

        /* ═══ HEADER — brand + controls ═══ */
        .dashboard-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-fine);
            border-radius: 60px;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 12px 20px;
        }

        .brand-group {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .brand-logo img {
            max-height: 40px;
            width: auto;
            display: block;
            filter: drop-shadow(0 0 8px rgba(217, 119, 54, 0.10));
            transition: filter 0.3s ease;
        }
        .brand-logo img:hover {
            filter: drop-shadow(0 0 20px rgba(217, 119, 54, 0.25));
        }

        .brand-text {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 0.08em;
            line-height: 1.2;
        }
        .brand-text small {
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            opacity: 0.6;
            display: block;
            font-weight: 400;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .header-clock {
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            letter-spacing: 0.04em;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.30);
            padding: 4px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-clock .ms {
            color: var(--accent-orange);
            font-size: 0.6rem;
            opacity: 0.7;
            min-width: 32px;
            text-align: right;
        }
        .latency-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 0.08em;
        }
        .latency-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00cc88;
            box-shadow: 0 0 10px #00cc88;
            animation: pulseDot 1.8s ease-in-out infinite;
        }
        @keyframes pulseDot {
            0%, 100% { opacity: 0.5; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .latency-value {
            color: var(--text-muted);
            min-width: 38px;
        }

        /* ═══ CENTRAL SECTION: Bug Tracker ═══ */
        .main-section {
            max-width: 760px;
            margin: 0 auto 36px;
        }

        .bug-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
            padding: 28px 32px;
            background: var(--card-bg);
            border-radius: 28px;
            border: 1px solid var(--border-fine);
        }
        .bug-form .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .bug-form label {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .bug-form input,
        .bug-form textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            color: var(--text-cream);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: 0.3s;
            outline: none;
            resize: vertical;
        }
        .bug-form input:focus,
        .bug-form textarea:focus {
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 3px rgba(217, 119, 54, 0.08);
        }

        /* ─── BOTÃO REPORT BUG — GRADIENTE ANIMADO AZUL/ROXO ─── */
        .bug-form .btn-submit {
            background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
            background-size: 200% 200%;
            animation: gradShift 4s ease-in-out infinite;
            border: none;
            color: #fff;
            font-weight: 800;
            padding: 14px;
            border-radius: 60px;
            font-family: 'Syne', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .bug-form .btn-submit::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.10);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .bug-form .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(0, 198, 255, 0.25), 0 0 60px rgba(180, 94, 255, 0.15);
        }
        .bug-form .btn-submit:hover::after {
            opacity: 1;
        }

        .ticket-list {
            margin-top: 24px;
            max-height: 340px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .ticket-list::-webkit-scrollbar {
            width: 3px;
        }
        .ticket-list::-webkit-scrollbar-thumb {
            background: var(--accent-orange);
            border-radius: 99px;
        }

        .ticket-item {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 12px;
            border-left: 3px solid var(--accent-orange);
            transition: 0.3s;
        }
        .ticket-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }
        .ticket-item .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .ticket-item .ticket-client {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-cream);
        }
        .ticket-item .ticket-time {
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            color: var(--text-muted);
        }
        .ticket-item .ticket-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin: 4px 0;
        }
        .ticket-item .ticket-url {
            font-size: 0.6rem;
            font-family: 'Space Mono', monospace;
            color: rgba(255,255,255,0.15);
        }

        .empty-tickets {
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
            font-family: 'Syne', sans-serif;
            font-size: 0.8rem;
            opacity: 0.5;
        }

        /* ═══ TAGLINE COM DESTAQUE ANIMADO ─── */
        .tagline-wrapper {
            margin-bottom: 28px;
            text-align: center;
            padding: 14px 20px;
            background: var(--glass);
            border-radius: 40px;
            border: 1px solid var(--border-fine);
            backdrop-filter: blur(12px);
        }
        .tagline-wrapper p {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.04em;
            color: var(--text-muted);
        }
        .tagline-wrapper .highlight {
            font-weight: 800;
            font-style: normal;
        }

        /* ═══ FOOTER ═══ */
        .dashboard-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-fine);
            margin-top: 20px;
        }
        .dashboard-footer .tagline {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 0.04em;
            color: var(--text-muted);
        }

        /* ═══ FLOATING TROSK BUTTON ═══ */
        .trosk-fab {
            position: fixed;
            bottom: 32px;
            right: 32px;
            z-index: 9990;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1.5px solid rgba(217, 119, 54, 0.25);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            animation: troskFloat 2.8s ease-in-out infinite;
            padding: 12px;
        }
        .trosk-fab:hover {
            transform: scale(1.08);
            border-color: var(--accent-orange);
            box-shadow: 0 0 40px var(--accent-orange-glow);
        }
        .trosk-fab img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            filter: drop-shadow(0 0 12px rgba(217, 119, 54, 0.15));
        }
        @keyframes troskFloat {
            0%, 100% {
                transform: translateY(0) scale(1);
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            }
            50% {
                transform: translateY(-6px) scale(1.02);
                box-shadow: 0 16px 48px rgba(217, 119, 54, 0.20);
            }
        }

        /* ═══ RESPONSIVE ═══ */
        @media (max-width: 600px) {
            .studio-dashboard {
                padding: 12px 12px 80px;
            }
            .dashboard-header {
                border-radius: 32px;
                padding: 12px 16px;
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .brand-group {
                justify-content: center;
            }
            .brand-logo img { max-height: 32px; }
            .brand-text { font-size: 1.1rem; }
            .brand-text small { font-size: 0.5rem; }
            .header-controls {
                justify-content: center;
                flex-wrap: wrap;
            }
            .bug-form { padding: 18px 16px; }
            .trosk-fab {
                width: 60px;
                height: 60px;
                bottom: 20px;
                right: 20px;
                padding: 10px;
            }
            .dashboard-footer .tagline { font-size: 0.6rem; }
            .tagline-wrapper p { font-size: 0.75rem; }
            .panel-title { font-size: 0.9rem; padding: 6px 14px; }
        }
        @media (max-width: 400px) {
            .trosk-fab {
                width: 52px;
                height: 52px;
                bottom: 16px;
                right: 16px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>

    <!-- ─── CURSOR ─── -->
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <!-- ─── BACKGROUND ─── -->
    <div class="cyber-bg"></div>

    <!-- ═══════════════════════════════════════════════════════════════
    DASHBOARD
    ═══════════════════════════════════════════════════════════════ -->
    <div class="studio-dashboard">

        <!-- ─── HEADER ─── -->
        <header class="dashboard-header">
            <div class="brand-group">
                <div class="brand-logo">
                    <img src="logo(1).png" alt="Heksel Studio" />
                </div>
                <div class="brand-text gradient-animated">
                    HEKSEL STUDIO
                    <small>// CORE</small>
                </div>
            </div>

            <div class="header-controls">
                <div class="header-clock">
                    <span id="clockDisplay">00:00:00</span>
                    <span class="ms" id="msDisplay">.000</span>
                </div>
                <div class="latency-indicator">
                    <span class="latency-dot"></span>
                    <span>LAT</span>
                    <span class="latency-value" id="latencyValue">12ms</span>
                </div>
            </div>
        </header>

        <!-- ─── TAGLINE COM DESTAQUE ANIMADO ─── -->
        <div class="tagline-wrapper">
            <p>
                <em class="highlight gradient-animated">“If the preliminary version is like this,</em>
                <span style="font-weight:300; opacity:0.5;"> imagine what the final version will be like.”</span>
            </p>
        </div>

        <!-- ─── BUG TRACKER ─── -->
        <div class="main-section">
            <div class="panel-title">
                🐞 BUG TRACKER
                <span class="badge">REAL‑TIME</span>
            </div>
            <div class="bug-form glass-panel">
                <div class="field">
                    <label>Your Name</label>
                    <input type="text" id="bugName" placeholder="e.g., Mike" />
                </div>
                <div class="field">
                    <label>Site / App URL</label>
                    <input type="text" id="bugUrl" placeholder="https://mike-site.com" />
                </div>
                <div class="field">
                    <label>Bug Description</label>
                    <textarea id="bugDesc" rows="3" placeholder="Describe the issue in detail..."></textarea>
                </div>
                <button class="btn-submit" id="submitBugBtn">✦ REPORT BUG</button>
            </div>

            <div class="ticket-list" id="ticketList">
                <div class="empty-tickets">No tickets reported yet. Your bugs will appear here.</div>
            </div>
        </div>

        <!-- ─── FOOTER ─── -->
        <div class="dashboard-footer">
            <span class="tagline">HEKSEL STUDIO v5.0 — <span class="trosk-matte-glow">Trosk Matte</span> · Firestore Real‑time</span>
            <span style="font-family:'Space Mono',monospace; font-size:0.55rem; color:var(--text-muted); opacity:0.2;">⚡ Heksel Imperium</span>
        </div>
    </div>

    <!-- ─── FLOATING TROSK BUTTON ─── -->
    <a class="trosk-fab" href="https://byhafavilha.github.io/Trosk/" target="_blank" rel="noopener noreferrer" aria-label="Open Trosk AI">
        <img src="trosk.logo.png" alt="Trosk AI" />
    </a>

    <!-- ═══════════════════════════════════════════════════════════════
    SINGLE MODULE SCRIPT — FIREBASE + APPLICATION LOGIC
    ═══════════════════════════════════════════════════════════════ -->
    <script type="module">
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // FIREBASE IMPORTS — Heksel Imperium Production
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
        import {
            getFirestore,
            collection,
            addDoc,
            onSnapshot,
            query,
            orderBy,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBLpnWUoNiKSiZWuWEVOwdAjeiNjvIv1T4",
            authDomain: "heksel-imperio.firebaseapp.com",
            projectId: "heksel-imperio",
            storageBucket: "heksel-imperio.firebasestorage.app",
            messagingSenderId: "598467080448",
            appId: "1:598467080448:web:6afe26361bf75c1c21c3e5",
            measurementId: "G-Z8K5WVT2WH"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);

        const ticketsCol = collection(db, 'tickets');

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // DOM REFS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const clockDisplay = document.getElementById('clockDisplay');
        const msDisplay = document.getElementById('msDisplay');
        const latencyValue = document.getElementById('latencyValue');

        const bugName = document.getElementById('bugName');
        const bugUrl = document.getElementById('bugUrl');
        const bugDesc = document.getElementById('bugDesc');
        const submitBugBtn = document.getElementById('submitBugBtn');
        const ticketList = document.getElementById('ticketList');

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // TOAST SYSTEM
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function showToast(msg, variant = 'orange') {
            const existing = document.querySelector('.toast-action');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast-action';
            const borderColor = variant === 'orange' ? 'rgba(217,119,54,0.30)' : 'rgba(217,119,54,0.20)';
            toast.style.cssText = `
                position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%) translateY(20px);
                z-index: 99999; background: rgba(14,14,18,0.94); backdrop-filter: blur(16px);
                border: 1px solid ${borderColor};
                padding: 12px 28px; border-radius: 60px; font-family: 'Syne', sans-serif;
                font-weight: 600; font-size: 0.75rem; letter-spacing: 0.06em; color: var(--text-cream);
                box-shadow: 0 8px 40px rgba(0,0,0,0.5); opacity: 0; transition: all 0.5s cubic-bezier(0.2,0.9,0.4,1.1);
                pointer-events: none; max-width: 90vw; text-align: center;
            `;
            toast.textContent = msg;
            document.body.appendChild(toast);
            requestAnimationFrame(() => {
                toast.style.opacity = '1';
                toast.style.transform = 'translateX(-50%) translateY(0)';
            });
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(20px)';
                setTimeout(() => toast.remove(), 600);
            }, 3400);
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // RENDER TICKETS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function renderTickets(tickets) {
            if (!ticketList) return;
            if (tickets.length === 0) {
                ticketList.innerHTML = `<div class="empty-tickets">No tickets reported yet. Your bugs will appear here.</div>`;
                return;
            }
            let html = '';
            const sorted = [...tickets].reverse();
            sorted.forEach(t => {
                const time = t.createdAt ? new Date(t.createdAt.seconds * 1000).toLocaleString() : new Date(t.timestamp).toLocaleString();
                html += `
                    <div class="ticket-item">
                        <div class="ticket-header">
                            <span class="ticket-client">${t.name || 'Anonymous'}</span>
                            <span class="ticket-time">${time}</span>
                        </div>
                        <div class="ticket-desc">${t.description || 'No description'}</div>
                        <div class="ticket-url">${t.url || 'No URL'}</div>
                    </div>
                `;
            });
            ticketList.innerHTML = html;
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // FIRESTORE REAL-TIME LISTENER — TICKETS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        let unsubscribeTickets = null;

        function subscribeTickets() {
            if (unsubscribeTickets) unsubscribeTickets();
            const q = query(ticketsCol, orderBy('createdAt', 'desc'));
            unsubscribeTickets = onSnapshot(q, (snapshot) => {
                const tickets = [];
                snapshot.forEach(doc => {
                    tickets.push({ id: doc.id, ...doc.data() });
                });
                renderTickets(tickets);
            }, (error) => {
                console.error('Tickets listener error:', error);
                showToast('⚠️ Firestore connection error. Check console.', 'orange');
            });
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // SUBMIT BUG TICKET
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        submitBugBtn.addEventListener('click', async function() {
            const name = bugName.value.trim();
            const url = bugUrl.value.trim();
            const description = bugDesc.value.trim();

            if (!name || !description) {
                showToast('⚠️ Name and description are required.', 'orange');
                return;
            }

            try {
                await addDoc(ticketsCol, {
                    name: name,
                    url: url || 'Not provided',
                    description: description,
                    createdAt: serverTimestamp(),
                    timestamp: Date.now()
                });
                showToast(`🐞 Ticket reported — Trosk is analyzing.`, 'orange');
                bugName.value = '';
                bugUrl.value = '';
                bugDesc.value = '';
            } catch (err) {
                console.error('Ticket error:', err);
                showToast('⚠️ Failed to submit ticket.', 'orange');
            }
        });

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // CLOCK + LATENCY
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const ms = String(now.getMilliseconds()).padStart(3, '0');
            clockDisplay.textContent = `${h}:${m}:${s}`;
            msDisplay.textContent = `.${ms}`;
            const lat = 12 + Math.floor(Math.random() * 16);
            latencyValue.textContent = lat + 'ms';
        }
        setInterval(updateClock, 50);
        updateClock();

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // CURSOR
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const dot = document.querySelector('.cursor-dot');
        const ring = document.querySelector('.cursor-ring');
        if (dot && ring) {
            let mx = 0, my = 0, rx = 0, ry = 0;
            document.addEventListener('mousemove', (e) => { mx = e.clientX; my = e.clientY; });

            function tick() {
                rx += (mx - rx) * 0.18;
                ry += (my - ry) * 0.18;
                dot.style.transform = `translate(${mx}px, ${my}px) translate(-50%,-50%)`;
                ring.style.transform = `translate(${rx}px, ${ry}px) translate(-50%,-50%)`;
                requestAnimationFrame(tick);
            }
            tick();

            document.querySelectorAll('button, .brand-text, .brand-logo, .bug-form, .trosk-fab')
                .forEach(el => {
                    el.addEventListener('mouseenter', () => {
                        ring.style.width = '56px';
                        ring.style.height = '56px';
                        ring.style.borderColor = 'var(--accent-orange)';
                    });
                    el.addEventListener('mouseleave', () => {
                        ring.style.width = '38px';
                        ring.style.height = '38px';
                        ring.style.borderColor = 'rgba(217,119,54,0.40)';
                    });
                });
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // INIT
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        try {
            subscribeTickets();
            console.log('🔥 HEKSEL STUDIO v5.0 — Trosk Matte palette engaged');
            console.log('📡 Listening to tickets collection...');
            console.log('💎 Heksel Imperium — Production ready');
        } catch (err) {
            console.error('Fatal initialization error:', err);
            showToast('⚠️ Failed to initialize Firestore. Check console.', 'orange');
        }
    </script>
</body>
</html>
